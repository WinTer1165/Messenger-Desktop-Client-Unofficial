appId: com.messenger-desktop-unofficial
productName: Messenger Desktop (Unofficial)
copyright: Copyright © 2025

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - "!**/*.ts"
  - "!**/*.map"
  - "!src/**/*"

# Ensure preload script is included
extraResources:
  - from: dist/preload/
    to: preload/
    filter:
      - "**/*"

asar: true
compression: maximum

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: assets/icon.ico
  # Request only necessary permissions
  requestedExecutionLevel: asInvoker
  # Code signing: Set WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD environment variables
  # or use cscLink and cscKeyPassword properties

nsis:
  # No spaces/parens: GitHub sanitizes asset names on upload, which would
  # break the latest.yml URL match that auto-update depends on.
  artifactName: Messenger-Desktop-Unofficial-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Messenger Desktop (Unofficial)

mac:
  artifactName: Messenger-Desktop-Unofficial-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.social-networking
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  sign: false

linux:
  artifactName: Messenger-Desktop-Unofficial-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
  icon: assets/icons
  category: Network
  maintainer: aminulislamlabib@gmail.com

# Auto-update configuration (optional)
publish:
  provider: github
  owner: WinTer1165
  repo: Messenger-Desktop-Client-Unofficial
