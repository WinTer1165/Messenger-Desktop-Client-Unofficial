name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.1.0
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # Windows Code Signing with Self-Signed Certificate (No Credit Card Required)
      # NOTE: the secrets context is not allowed in step-level `if`
      # expressions, so the check goes through an env var instead.
      - name: Decode Certificate (Windows)
        if: matrix.os == 'windows-latest' && env.HAS_WIN_CERT == 'true'
        env:
          HAS_WIN_CERT: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
        run: |
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_BASE64 }}")
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
        shell: pwsh

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty when the cert secret is missing -> unsigned build instead of a failure
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CERT_BASE64 != '' && 'cert.pfx' || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      # Portable zips referenced by the README and the download webpage
      - name: Package Portable Versions (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "release\Messenger-Desktop-Unofficial-$version-Portable-x64.zip"
          Compress-Archive -Path "release\win-arm64-unpacked\*" -DestinationPath "release\Messenger-Desktop-Unofficial-$version-Portable-ARM64.zip"
        shell: pwsh

      - name: Build Electron App (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS requires paid Apple Developer cert
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Electron App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.msi
            release/Messenger-Desktop-Unofficial-*-Portable-*.zip
          retention-days: 30

      - name: Upload macOS Artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 30

      - name: Upload Linux Artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
          retention-days: 30

      # Create GitHub Release
      # latest*.yml and *.blockmap are required by electron-updater:
      # they are the update feed and differential-download metadata.
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
            release/*.msi
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/Messenger-Desktop-Unofficial-*-Portable-*.zip
            release/latest*.yml
            release/*.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
